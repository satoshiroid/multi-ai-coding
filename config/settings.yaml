# =========================================================================
# Hierarchical Multi-Agent Orchestration (HMAO) — runtime settings
#
# LLM assignment is two-layer:
#   * `tiers` (L1/L2/L3) — the baseline fallback for any agent.
#   * `agents` — per-agent placement that tunes each "virtual employee" to the
#     LLM that plays to its strength (Gemini=fast planning, Claude=code/judgment,
#     OpenAI=creative+general code). This is the active default.
# Both are overridable from Git (env vars / GitHub Actions Variables) and the
# run-time `llm` dropdown — see the precedence note above `agents:`.
# Local LLMs (ollama) proved impractical for tool ops on 8GB-class machines
# (qwen2.5-coder:3b lacks bpy knowledge; 7b does not fit) — see
# docs/architecture-review.md.
# =========================================================================

# Per-tier LLM assignment (hybrid cost strategy by default).
tiers:
  L1:                              # PM / Orchestrator
    provider: gemini
    model: gemini-2.0-flash
    fallback:
      provider: gemini
      model: gemini-2.0-flash
  L2:                              # Senior design manager
    provider: gemini
    model: gemini-2.0-flash
    fallback:
      provider: gemini
      model: gemini-2.0-flash
  L3:                              # Workers (implement / debug / tool ops)
    provider: anthropic
    model: claude-opus-4-8
    fallback:
      provider: gemini
      model: gemini-2.0-flash

# Per-agent LLM assignment ("virtual employees"). Each agent below overrides its
# tier default so its character is tuned to that LLM's strength. Resolution
# precedence (high→low):
#   LLM_FORCE_* (run dropdown) > LLM_AGENT_<NAME>_* (Git vars) >
#   agents.<name> (here) > LLM_L<tier>_* (Git vars) > tiers.L<n> (above).
# Every primary has a cross-provider fallback so a transient 429/outage on one
# provider never stalls the pipeline.
agents:
  pm:                              # L1 — planning/decomposition, high call volume
    provider: gemini               #   Gemini: fast, cheap, large context for
    model: gemini-2.0-flash        #   cross-domain block diagrams.
    fallback: {provider: anthropic, model: claude-sonnet-4-6}
  senior:                          # L2 — highest-stakes review / arbitration
    provider: anthropic            #   Claude Opus: best careful judgment.
    model: claude-opus-4-8
    fallback: {provider: anthropic, model: claude-sonnet-4-6}
  design:                          # L3 — industrial/UX design, multimodal
    provider: openai               #   GPT-4o: creative + multimodal ideation.
    model: gpt-4o
    fallback: {provider: gemini, model: gemini-2.0-flash}
  mecha:                           # L3 — FreeCAD parametric CAD, self-correcting
    provider: anthropic            #   Claude Opus: code precision is decisive.
    model: claude-opus-4-8
    fallback: {provider: anthropic, model: claude-sonnet-4-6}
  circuit:                         # L3 — KiCAD schematic / PCB / BOM
    provider: anthropic            #   Claude Sonnet: structured EDA, balanced.
    model: claude-sonnet-4-6
    fallback: {provider: openai, model: gpt-4o-mini}
  software:                        # L3 — firmware (C/C++) or app code
    provider: openai               #   GPT-4o: strong general-purpose code.
    model: gpt-4o
    fallback: {provider: anthropic, model: claude-sonnet-4-6}

# Provider connection defaults. API keys/URLs come from environment vars.
providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 0.2
  gemini:
    api_key_env: GEMINI_API_KEY
    max_tokens: 8192
    temperature: 0.2
    # Exponential backoff on 429 (free-tier rate limit) before failing over.
    rate_limit_retries: 3
    rate_limit_base_delay: 2.0
  openai:
    api_key_env: OPENAI_API_KEY
    max_tokens: 8192
    temperature: 0.2
  ollama:
    base_url_env: OLLAMA_BASE_URL
    max_tokens: 4096
    temperature: 0.2

# Escalation: L3 confidence below this routes the task up to L2.
escalation:
  confidence_threshold: 70

# Cross-domain consistency tolerances (mm).
consistency:
  clearance_margin_mm: 1.0        # required gap between PCB edge and enclosure inner wall
  mount_tolerance_mm: 0.5         # mounting-hole alignment tolerance

# Human-in-the-loop behaviour.
hitl:
  timeout_hours: 72
  notify_progress: true           # post per-stage progress to the project thread

# MCP servers for CAD/EDA tools. `command`/`args` launch a local stdio server;
# leave `enabled: false` to use the built-in mock transport (CI / no-CAD env).
mcp:
  blender:
    # BlenderMCP addon (ahujasid/blender-mcp): the in-Blender "Running on port
    # 9876" server is a raw JSON-over-TCP socket, NOT an MCP/SSE endpoint —
    # transport `tcp` speaks that protocol directly (no uvx bridge needed).
    enabled: true
    transport: tcp
    host: localhost
    port: 9876
  freecad:
    enabled: false
    transport: stdio
    command: freecad-mcp
    args: []
  kicad:
    enabled: false
    transport: stdio
    command: kicad-mcp
    args: []

# State persistence.
state:
  db_path_env: STATE_DB_PATH
  db_path_default: ./data/state.db
