# =========================================================================
# Multi-AI Coding вҖ” pipeline execution on GitHub Actions.
#
# Intake (Discord bot) fires a `repository_dispatch` carrying the requirement
# and the project_type decided by the channel (#hardware / #app). This workflow
# routes the build to the right runner, runs the pipeline head-to-tail with the
# type pinned (no LLM classification), exports the result, and opens a PR.
#
#   app      вҶ’ ubuntu-latest        (hosted; software-only, no CAD)
#   hardware вҶ’ [self-hosted, macOS] (the Mac with Blender/FreeCAD/KiCAD + MCP)
#
# The PR review IS the human approval gate (internal HITL gates auto-approve).
# =========================================================================
name: build

on:
  repository_dispatch:
    types: [new-project]
  workflow_dispatch:
    inputs:
      requirement:
        description: "иЈҪе“Ғ/гӮўгғ—гғӘгҒ®иҰҒд»¶пјҲиҮӘз„¶иЁҖиӘһпјү"
        required: true
        type: string
      project_type:
        description: "зЁ®еҲҘ"
        required: true
        type: choice
        options: [app, hardware]
      llm:
        description: "LLMпјҲdefault=гғӘгғқгӮёгғҲгғӘеӨүж•°/иЁӯе®ҡгӮ’дҪҝз”Ёпјү"
        required: false
        type: choice
        default: default
        options: [default, claude, gemini, openai]
      thread_id:
        description: "Discord гӮ№гғ¬гғғгғүIDпјҲйҖҡзҹҘз”Ёгғ»д»»ж„Ҹпјү"
        required: false
        type: string

jobs:
  # ----------------------------------------------------------------------- #
  # Normalize both trigger shapes into a single set of outputs and decide the
  # runner from project_type. Always runs on a cheap hosted runner.
  # ----------------------------------------------------------------------- #
  setup:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.route.outputs.runner }}
      project_type: ${{ steps.route.outputs.project_type }}
      requirement: ${{ steps.route.outputs.requirement }}
      thread_id: ${{ steps.route.outputs.thread_id }}
      llm_force_provider: ${{ steps.route.outputs.llm_force_provider }}
      llm_force_model: ${{ steps.route.outputs.llm_force_model }}
    steps:
      - id: route
        # All user-controlled values come in via env (never inlined into the
        # script body) so a crafted requirement can't inject shell.
        env:
          EVENT: ${{ github.event_name }}
          RD_TYPE: ${{ github.event.client_payload.project_type }}
          RD_REQ: ${{ github.event.client_payload.requirement }}
          RD_THREAD: ${{ github.event.client_payload.thread_id }}
          RD_LLM: ${{ github.event.client_payload.llm }}
          WD_TYPE: ${{ github.event.inputs.project_type }}
          WD_REQ: ${{ github.event.inputs.requirement }}
          WD_THREAD: ${{ github.event.inputs.thread_id }}
          WD_LLM: ${{ github.event.inputs.llm }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "repository_dispatch" ]; then
            TYPE="$RD_TYPE"; REQ="$RD_REQ"; THREAD="$RD_THREAD"; LLM="${RD_LLM:-}"
          else
            TYPE="$WD_TYPE"; REQ="$WD_REQ"; THREAD="$WD_THREAD"; LLM="${WD_LLM:-}"
          fi
          TYPE="$(printf '%s' "$TYPE" | tr '[:upper:]' '[:lower:]')"
          if [ "$TYPE" != "app" ] && [ "$TYPE" != "hardware" ]; then
            echo "::error::invalid project_type: '$TYPE' (expected app|hardware)"
            exit 1
          fi
          if [ "$TYPE" = "hardware" ]; then
            RUNNER='["self-hosted","macOS"]'
          else
            RUNNER='"ubuntu-latest"'
          fi
          # LLM dropdown вҶ’ a global FORCE override that wins over every agent
          # for this run. "default"/empty leaves selection to the per-agent
          # settings.yaml / Variables.
          case "$(printf '%s' "$LLM" | tr '[:upper:]' '[:lower:]')" in
            claude) FP=anthropic; FM=claude-sonnet-4-6 ;;
            gemini) FP=gemini;    FM=gemini-2.0-flash ;;
            openai) FP=openai;    FM=gpt-4o ;;
            *)      FP="";        FM="" ;;
          esac
          {
            echo "runner=$RUNNER"
            echo "project_type=$TYPE"
            echo "thread_id=$THREAD"
            echo "llm_force_provider=$FP"
            echo "llm_force_model=$FM"
          } >> "$GITHUB_OUTPUT"
          # requirement may contain spaces/newlines вҶ’ heredoc-form output.
          {
            echo "requirement<<__REQ_EOF__"
            printf '%s\n' "$REQ"
            echo "__REQ_EOF__"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------- #
  # Run the pipeline on the routed runner, export results, open a PR.
  # ----------------------------------------------------------------------- #
  build:
    needs: setup
    runs-on: ${{ fromJSON(needs.setup.outputs.runner) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Type + requirement via env (no shell injection from user input).
          PROJECT_TYPE: ${{ needs.setup.outputs.project_type }}
          REQUIREMENT: ${{ needs.setup.outputs.requirement }}
          # LLM credentials вҖ” managed entirely in GitHub Secrets.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          # LLM selection. Precedence (highвҶ’low): FORCE (dropdown) > per-agent
          # Variables > settings.yaml `agents` > per-tier Variables > settings.yaml
          # `tiers`. Keys stay in Secrets above; selection is non-secret here.
          LLM_FORCE_PROVIDER: ${{ needs.setup.outputs.llm_force_provider }}
          LLM_FORCE_MODEL: ${{ needs.setup.outputs.llm_force_model }}
          # Per-agent overrides (optional; blank вҶ’ settings.yaml agents block).
          LLM_AGENT_PM_PROVIDER: ${{ vars.LLM_AGENT_PM_PROVIDER }}
          LLM_AGENT_PM_MODEL: ${{ vars.LLM_AGENT_PM_MODEL }}
          LLM_AGENT_SENIOR_PROVIDER: ${{ vars.LLM_AGENT_SENIOR_PROVIDER }}
          LLM_AGENT_SENIOR_MODEL: ${{ vars.LLM_AGENT_SENIOR_MODEL }}
          LLM_AGENT_DESIGN_PROVIDER: ${{ vars.LLM_AGENT_DESIGN_PROVIDER }}
          LLM_AGENT_DESIGN_MODEL: ${{ vars.LLM_AGENT_DESIGN_MODEL }}
          LLM_AGENT_MECHA_PROVIDER: ${{ vars.LLM_AGENT_MECHA_PROVIDER }}
          LLM_AGENT_MECHA_MODEL: ${{ vars.LLM_AGENT_MECHA_MODEL }}
          LLM_AGENT_CIRCUIT_PROVIDER: ${{ vars.LLM_AGENT_CIRCUIT_PROVIDER }}
          LLM_AGENT_CIRCUIT_MODEL: ${{ vars.LLM_AGENT_CIRCUIT_MODEL }}
          LLM_AGENT_SOFTWARE_PROVIDER: ${{ vars.LLM_AGENT_SOFTWARE_PROVIDER }}
          LLM_AGENT_SOFTWARE_MODEL: ${{ vars.LLM_AGENT_SOFTWARE_MODEL }}
          # Per-tier baseline overrides (optional).
          LLM_L1_PROVIDER: ${{ vars.LLM_L1_PROVIDER }}
          LLM_L1_MODEL: ${{ vars.LLM_L1_MODEL }}
          LLM_L2_PROVIDER: ${{ vars.LLM_L2_PROVIDER }}
          LLM_L2_MODEL: ${{ vars.LLM_L2_MODEL }}
          LLM_L3_PROVIDER: ${{ vars.LLM_L3_PROVIDER }}
          LLM_L3_MODEL: ${{ vars.LLM_L3_MODEL }}
          # Keep CI state out of the repo working tree.
          STATE_DB_PATH: ${{ runner.temp }}/state.db
        run: |
          python examples/run_pipeline.py \
            --auto-approve \
            --project-type "$PROJECT_TYPE" \
            --export ./out \
            "$REQUIREMENT"

      - name: Post design sketches to Discord
        if: ${{ needs.setup.outputs.project_type == 'app' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          THREAD_ID: ${{ needs.setup.outputs.thread_id }}
        run: |
          set -uo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ] || [ -z "${THREAD_ID:-}" ]; then
            echo "sketch post skipped (no webhook/thread)"; exit 0
          fi
          shopt -s nullglob
          files=(out/renders/sketch_*.png)
          if [ ${#files[@]} -eq 0 ]; then echo "no sketches to post"; exit 0; fi
          args=(-F 'payload_json={"content":"рҹҺЁ GUIгғҮгӮ¶гӮӨгғіжЎҲгҒҢгҒ§гҒҚгҒҫгҒ—гҒҹпјҲиҮӘеӢ•жҺЎз”ЁгҒҜжЎҲ1гҖӮе…ЁжЎҲгҒҜгҒ“гҒЎгӮүпјү"}')
          i=0; for f in "${files[@]}"; do args+=(-F "files[$i]=@$f"); i=$((i+1)); done
          code=$(curl -s -o /tmp/sk.txt -w "%{http_code}" \
            "${DISCORD_WEBHOOK_URL}?thread_id=${THREAD_ID}" "${args[@]}" || echo "000")
          echo "sketch post HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::warning::sketch post failed ($code): $(head -c 200 /tmp/sk.txt 2>/dev/null)"
          fi

      - name: Validate generated app
        if: ${{ needs.setup.outputs.project_type == 'app' }}
        run: python scripts/validate_generated.py ./out/code ./out/VALIDATION.md

      - name: Open pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: project/${{ needs.setup.outputs.project_type }}-${{ github.run_id }}
          base: main
          add-paths: out/**
          commit-message: "feat(${{ needs.setup.outputs.project_type }}): pipeline output (run ${{ github.run_id }})"
          title: "[${{ needs.setup.outputs.project_type }}] иҮӘеӢ•з”ҹжҲҗжҲҗжһңзү© (run ${{ github.run_id }})"
          body: |
            иҮӘеӢ•гғ‘гӮӨгғ—гғ©гӮӨгғігҒ®жҲҗжһңзү©гҒ§гҒҷгҖӮгғ¬гғ“гғҘгғјпјқжңҖзөӮжүҝиӘҚгӮІгғјгғҲгҒ§гҒҷгҖӮ

            - зЁ®еҲҘ: `${{ needs.setup.outputs.project_type }}`
            - гғ©гғігғҠгғј: `${{ needs.setup.outputs.runner }}`
            - жҲҗжһңзү©: `out/`пјҲ`PROJECT.md` / `summary.json` / `VALIDATION.md` гҒ»гҒӢпјү
            - е…¬й–ӢURL: ${{ needs.setup.outputs.project_type == 'app' && format('https://{0}.github.io/{1}/{2}/', github.repository_owner, github.event.repository.name, github.run_id) || 'пјҲappгҒ®гҒҝпјү' }}
            - гӮўгғ—гғӘгҒ®гғӘгғқгӮёгғҲгғӘ: ${{ needs.setup.outputs.project_type == 'app' && format('https://github.com/{0}/app-{1}', github.repository_owner, github.run_id) || 'пјҲappгҒ®гҒҝпјү' }}

            гғһгғјгӮёгҒ§жүҝиӘҚгҖҒгӮҜгғӯгғјгӮәгҒ§еҚҙдёӢгҖӮ

      - name: Notify Discord thread
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          THREAD_ID: ${{ needs.setup.outputs.thread_id }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PROJECT_TYPE: ${{ needs.setup.outputs.project_type }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PAGE_URL: ${{ needs.setup.outputs.project_type == 'app' && format('https://{0}.github.io/{1}/{2}/', github.repository_owner, github.event.repository.name, github.run_id) || '' }}
          REPO_URL: ${{ needs.setup.outputs.project_type == 'app' && format('https://github.com/{0}/app-{1}', github.repository_owner, github.run_id) || '' }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ] || [ -z "${THREAD_ID:-}" ]; then
            echo "Discord notify skipped (no webhook or thread_id)."
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ] && [ -n "${PR_URL:-}" ]; then
            MSG="вң… [$PROJECT_TYPE] е®ҢдәҶгҖӮPR: $PR_URL"
            if [ -n "${PAGE_URL:-}" ]; then
              MSG="$MSG"$'\n'"рҹҢҗ е…¬й–Ӣ: $PAGE_URL"
            fi
            if [ -n "${REPO_URL:-}" ]; then
              MSG="$MSG"$'\n'"рҹ“Ұ гғӘгғқгӮёгғҲгғӘ: $REPO_URL"
            fi
          else
            MSG="вқҢ [$PROJECT_TYPE] еӨұж•— ($JOB_STATUS)гҖӮгғӯгӮ°: $RUN_URL"
          fi
          # Post into the originating forum thread via ?thread_id=. Build the
          # JSON with python (always present here) so no jq dependency is needed
          # on the self-hosted macOS runner. Notify is best-effort: a non-2xx
          # (e.g. webhook/thread mismatch) must NOT fail the build.
          BODY="$(MSG="$MSG" python -c 'import json,os;print(json.dumps({"content":os.environ["MSG"]}))')"
          code=$(curl -s -o /tmp/wh.txt -w "%{http_code}" -H "Content-Type: application/json" \
            -X POST "${DISCORD_WEBHOOK_URL}?thread_id=${THREAD_ID}" -d "$BODY" || echo "000")
          echo "discord notify HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::warning::Discord notify failed ($code): $(cat /tmp/wh.txt 2>/dev/null | head -c 200)"
          fi

  # ----------------------------------------------------------------------- #
  # Publish the app to GitHub Pages in an isolated job вҖ” its own checkout/git
  # state so the Pages push can't interfere with PR creation in `build`.
  # ----------------------------------------------------------------------- #
  deploy:
    needs: [setup, build]
    if: ${{ needs.setup.outputs.project_type == 'app' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: project/app-${{ github.run_id }}   # the PR branch (has out/code)
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out/code
          target-folder: ${{ github.run_id }}
          clean: false                            # keep other projects' folders
          commit-message: "deploy app ${{ github.run_id }}"

      - name: Publish app to its own repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GH_PAT not set вҖ” skipping standalone repo publish"; exit 0
          fi
          repo="app-${RUN_ID}"
          cd out/code
          git init -q -b main
          git config user.email "bot@users.noreply.github.com"
          git config user.name "multi-ai-bot"
          git add -A
          git commit -qm "init: generated app (run ${RUN_ID})"
          if gh repo create "${OWNER}/${repo}" --public --source=. --remote=origin --push \
               --description "Auto-generated app (run ${RUN_ID})"; then
            echo "published https://github.com/${OWNER}/${repo}"
          else
            echo "::warning::standalone repo publish failed for ${OWNER}/${repo}"
          fi
