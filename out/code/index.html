
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Comparison Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #container { display: flex; flex-direction: row; height: 100vh; }
        #viewer-left, #viewer-right { flex: 1; overflow: auto; position: relative; }
        canvas { width: 100%; height: auto; }
        #controls { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); }
        #controls button { margin: 0 5px; }
        @media (max-width: 768px) {
            #container { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="viewer-left"></div>
        <div id="viewer-right"></div>
    </div>
    <div id="controls">
        <button id="prev">Previous</button>
        <span id="page-info">Page: 1 / 1</span>
        <button id="next">Next</button>
        <button id="zoom-in">Zoom In</button>
        <button id="zoom-out">Zoom Out</button>
        <button id="diff-toggle">Toggle Diff</button>
    </div>
    <input type="file" id="file-input-left" accept=".pptx,.png,.jpg,.jpeg,.webp" style="display:none;" multiple>
    <input type="file" id="file-input-right" accept=".pptx,.png,.jpg,.jpeg,.webp" style="display:none;" multiple>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.4.0/dist/pptxgen.min.js"></script>
    <script>
        let currentPage = 0;
        let zoomLevel = 1.0;
        let leftPages = [];
        let rightPages = [];
        let diffMode = false;

        document.getElementById('prev').addEventListener('click', () => changePage(-1));
        document.getElementById('next').addEventListener('click', () => changePage(1));
        document.getElementById('zoom-in').addEventListener('click', () => changeZoom(0.1));
        document.getElementById('zoom-out').addEventListener('click', () => changeZoom(-0.1));
        document.getElementById('diff-toggle').addEventListener('click', toggleDiff);

        function changePage(delta) {
            const maxPage = Math.max(leftPages.length, rightPages.length) - 1;
            currentPage = Math.min(maxPage, Math.max(0, currentPage + delta));
            renderPage(currentPage);
        }

        function changeZoom(delta) {
            zoomLevel = Math.min(2.0, Math.max(0.5, zoomLevel + delta));
            document.querySelectorAll('canvas').forEach(canvas => {
                canvas.style.transform = `scale(${zoomLevel})`;
            });
        }

        function toggleDiff() {
            diffMode = !diffMode;
            renderPage(currentPage);
        }

        function renderPage(index) {
            const leftViewer = document.getElementById('viewer-left');
            const rightViewer = document.getElementById('viewer-right');
            leftViewer.innerHTML = '';
            rightViewer.innerHTML = '';

            if (index < leftPages.length) {
                leftViewer.appendChild(leftPages[index]);
            } else {
                leftViewer.innerHTML = `<div style='background: gray;'>No page (${index + 1}/${leftPages.length})</div>`;
            }

            if (index < rightPages.length) {
                rightViewer.appendChild(rightPages[index]);
            } else {
                rightViewer.innerHTML = `<div style='background: gray;'>No page (${index + 1}/${rightPages.length})</div>`;
            }

            if (diffMode) {
                highlightDifferences();
            }

            document.getElementById('page-info').textContent = `Page: ${index + 1} / ${Math.max(leftPages.length, rightPages.length)}`;
        }

        function highlightDifferences() {
            // Placeholder for diff logic
            console.log('Diff mode active');
        }

        // File handling logic
        document.getElementById('file-input-left').addEventListener('change', handleFileSelect);
        document.getElementById('file-input-right').addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const files = event.target.files;
            const isLeft = event.target.id === 'file-input-left';
            const pages = isLeft ? leftPages : rightPages;
            pages.length = 0; // Clear existing pages

            Array.from(files).forEach(file => {
                if (file.type.includes('image')) {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        pages.push(canvas);
                        if (pages.length === 1) renderPage(currentPage);
                    };
                    img.src = URL.createObjectURL(file);
                } else if (file.name.endsWith('.pptx')) {
                    // Handle PPTX files
                    console.log('PPTX file handling not implemented');
                } else {
                    alert('Unsupported file type');
                }
            });
        }

        // Initial render
        renderPage(currentPage);
    </script>
</body>
</html>
